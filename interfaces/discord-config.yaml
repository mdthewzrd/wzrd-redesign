# Discord Bot Configuration
# Maps Discord channels to WZRD topics

discord:
  # Bot credentials
  bot_token: "MTQ4MTM0ODU0NDkyMDI4OTM5Ng.GwZrya.dVZI3fycdXbg0sW3PWUFAAda_UatTXQ18xnMHk"
  client_id: "677335430336610315"
  client_secret: ""  # Not needed for bot
  
  # Server configuration
  guild_id: "1473755847548207195"  # Your Remi server
  
  # Channel to topic mappings
  channels:
    # WZRD Framework Core
    framework: "1481800155220148296"
    
    # Topic System + Discord
    topics: "1481800251806580757"
    
    # Web UI Development
    web-ui: "1481800276330418279"
    
    # Documentation
    docs: "1481800409478725652"
    
    # Projects
    wzrd-redesign: "1481800346253660290"
    
    # System
    general: "1481800429523308624"
    testing: "1481800445465723012"
    
    # Legacy (for backward compatibility)
    logs: "1473755847548207198"
    alerts: "1473755847548207198"

  # Bot permissions
  permissions:
    remi: ["VIEW_CHANNEL", "SEND_MESSAGES", "READ_MESSAGE_HISTORY", "MANAGE_MESSAGES"]
    users: ["VIEW_CHANNEL", "SEND_MESSAGES", "READ_MESSAGE_HISTORY"]
    projects: ["VIEW_CHANNEL"]  # Project agents can only view
    
  # Topic management
  topic_auto_create: true
  topic_sync_interval: 5000  # Sync every 5 seconds
  
  # Bot behavior
  response_delay: 1000  # 1 second delay before responding
  message_history_size: 50  # Keep last 50 messages per channel
  
  # Command prefix
  command_prefix: "!wzrd"
  
  # Features
  features:
    topic_switching: true
    progress_syncing: true
    memory_access: true
    file_upload: true
    cost_tracking: true
    
  # Rate limiting
  rate_limits:
    messages_per_minute: 30
    commands_per_minute: 10
    topic_switches_per_hour: 20
    
  # Security
  allowed_users: []  # Empty means all users allowed
  blocked_users: []
  admin_users: []    # Users with admin privileges
  
  # Logging
  log_level: "info"
  log_file: "/home/mdwzrd/wzrd-redesign/logs/discord.log"
  
  # Monitoring
  health_check_interval: 30000  # 30 seconds
  reconnect_attempts: 10
  reconnect_delay: 5000  # 5 seconds